name: Build

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
    paths-ignore:
    - 'README.md'       

jobs:
  CheckSkipCI:
    runs-on: ubuntu-latest
    if: |
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.pull_request.title, '[skip ci]') &&
      !contains(github.event.head_commit.message, '[skip-ci]') &&
      !contains(github.event.pull_request.title, '[skip-ci]')
    steps:
      - run: exit 0

  Windows:
    runs-on: "windows-latest"
    needs: [CheckSkipCI]

    strategy:
      matrix:
        build_type: [Release]
    steps:
      - name: Configure MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Checkout
        uses: actions/checkout@v2

      - name: Configure
        run: cmake -H"." -B"build/windows" -G "Visual Studio 16 2019" -A x64 -DCMAKE_INSTALL_PREFIX="SDK" -DALIMER_BUILD_SAMPLES=ON

      - name: "Build Windows in ${{ matrix.build_type }}"
        run: cmake --build "build/windows" --target install --config ${{ matrix.build_type }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v2
        with:
          name: 'Windows SDK ${{ matrix.build-type }}'
          path: SDK

  Linux:
    runs-on: "ubuntu-latest"
    needs: [CheckSkipCI]
    
    strategy:
      matrix:
        build_type: [Release]
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt install libsdl2-dev

      - name: Configure
        run: cmake -H"." -B"build/ubuntu" -DCMAKE_INSTALL_PREFIX="SDK" -DALIMER_BUILD_SAMPLES=ON

      - name: "Build ${{ matrix.build_type }}"
        run: cmake --build "build/ubuntu" --target install --config ${{ matrix.build_type }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v2
        with:
          name: 'Ubuntu SDK ${{ matrix.build-type }}'
          path: SDK          